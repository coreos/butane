name: TMT Tests

on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      plan_filter:
        description: |
          Test plan filter name, ie: tag:smoke.
          If provided, only tests matching this filter will be run, otherwise all tests will be run.
          From the TMT help:
            Apply an advanced filter using key:value
            pairs and logical operators. For example
            'tier:1 & tag:core'. Use the 'name' key to
            search by name. See 'pydoc fmf.filter' for
            detailed documentation on the syntax
        required: false
        default: ''
      use_built_from_src:
        description: 'Built butane from source instead of install distro package'
        required: false
        default: 'true'

jobs:
  tmt-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set additional paths
        run: |
          set -x -e -o pipefail
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          set -x -e -o pipefail
          sudo apt-get update
          sudo apt-get install -y podman libblkid-dev rsync
          pip install --user tmt

      - name: Build butane
        if: github.event.inputs.use_built_from_src == '' || github.event.inputs.use_built_from_src == 'true'
        run: |
          set -x -e -o pipefail
          ./build_for_container

      - name: Build test container
        run: sudo podman build -t localhost/butane-test:latest -f Dockerfile .

      - name: Run TMT tests in container
        run: |
          sudo podman run --rm \
            -v ${{ github.workspace }}:/workspace:Z \
            -w /workspace \
            localhost/butane-test:latest \
            bash -c "tmt run ..."
